architecture_id: communication_demo_runtime_architecture
configuration_id: demo

nodes:
  - selector:
      package: demo_pkg
      executable: talker_a
      name: talker_a

    runtime_name: /talker_a

    publishes:
      - topic: /shared_topic
        msg_type: std_msgs/msg/String
        qos:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10

  - selector:
      package: demo_pkg
      executable: talker_b
      name: talker_b

    runtime_name: /talker_b

    publishes:
      - topic: /shared_topic
        msg_type: std_msgs/msg/String
        qos:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10

  - selector:
      package: demo_pkg
      executable: shared_listener
      name: shared_listener

    runtime_name: /shared_listener

    subscribes:
      - topic: /shared_topic
        msg_type: std_msgs/msg/String
        qos:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10

  - selector:
      package: demo_pkg
      executable: qos_publisher
      name: qos_publisher

    runtime_name: /qos_publisher

    publishes:
      - topic: /qos_topic
        msg_type: std_msgs/msg/String
        qos:
          reliability: best_effort
          durability: volatile
          history: keep_last
          depth: 10

  - selector:
      package: demo_pkg
      executable: qos_subscriber
      name: qos_subscriber

    runtime_name: /qos_subscriber

