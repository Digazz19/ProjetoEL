    runtime_name: /lonely_publisher

    publishes:
      - topic: /lonely_pub
        msg_type: std_msgs/msg/String
        qos:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10

  - selector:
      package: demo_pkg
      executable: lonely_subscriber
      name: lonely_subscriber

    runtime_name: /lonely_subscriber

    subscribes:
      - topic: /lonely_sub
        msg_type: std_msgs/msg/String
        qos:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10