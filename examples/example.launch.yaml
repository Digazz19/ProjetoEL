launch:
  - arg:
      name: use_sim
      default: "false"

  - let:
      name: robot_name
      value: kobuki

  - set_env:
      name: RMW_IMPLEMENTATION
      value: rmw_fastrtps_cpp

  - node:
      name: controller
      pkg: nav2
      exec: controller_server

  - group:
    - node:
        name: talker_node
        pkg: demo_nodes_cpp
        exec: talker
        namespace: robot1
        param:
          - name: rate
            value: "10"
        remap:
          - from: chatter
            to: robot_chat
          - from: /chatter_global
            to: /global/chat

    - node:
        name: listener_node
        pkg: demo_nodes_cpp
        exec: listener
        namespace: robot1
        remap:
          - from: chatter
            to: robot_chat

    - node:
        name: lidar
        pkg: sensor_pkg
        exec: lidar_driver
        namespace: sensors
        remap:
          - from: scan
            to: base_scan

  - include:
      file: sensors.launch.xml
      arg:
        - name: sensor_rate
          value: "50"

  - executable:
      cmd: "ls -las"
      cwd: /home

  - unset_env:
      name: OLD_ENV